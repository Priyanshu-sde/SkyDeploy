# Cloudflare Worker that serves deployed sites from R2 by subdomain.
# Replaces the always-on Express request-handler. $0, no VM, idles at zero cost.
#
# Deploy:  cd request-handler/worker && npx wrangler deploy
name = "skydeploy-request-handler"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Bind the existing R2 bucket. No access keys needed inside a Worker.
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "skydeploy"

# Serve every subdomain. The route only fires if the hostname is PROXIED, so
# add a proxied wildcard DNS record in the Cloudflare dashboard (DNS → Records):
#   Type: A   Name: *.skydeploy   IPv4: 192.0.2.1   Proxy: ON (orange cloud)
# 192.0.2.1 is a throwaway address — the Worker intercepts the request before
# the "origin" is ever contacted. `wrangler deploy` then attaches this route.
[[routes]]
pattern = "*.skydeploy.priyanshusde.me/*"
zone_name = "priyanshusde.me"
