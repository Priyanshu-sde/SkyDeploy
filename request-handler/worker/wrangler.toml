# Cloudflare Worker that serves deployed sites from R2 by subdomain.
# Replaces the always-on Express request-handler. $0, no VM, idles at zero cost.
#
# Deploy:  cd request-handler/worker && npx wrangler deploy
name = "skydeploy-request-handler"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Bind the existing R2 bucket. No access keys needed inside a Worker.
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "skydeploy"

# Sites are served at <id>.priyanshusde.me — a FIRST-level subdomain, which the
# free Cloudflare Universal SSL cert covers (a 2-level wildcard like
# *.skydeploy.priyanshusde.me would need paid Advanced Certificate Manager).
#
# The route only fires on a PROXIED hostname, so add a proxied wildcard record
# in the Cloudflare dashboard (DNS → Records):
#   Type: A   Name: *   IPv4: 192.0.2.1   Proxy: ON (orange cloud)
# 192.0.2.1 is a throwaway — the Worker intercepts before any "origin" is hit.
# Explicit records (api-skydeploy, www, apex) win over the wildcard, so they're
# unaffected. `wrangler deploy` then attaches this route.
[[routes]]
pattern = "*.priyanshusde.me/*"
zone_name = "priyanshusde.me"
